<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=460, initial-scale=1.0" />
    <title>Window</title>
    <style>
      html,
      body,
      #root {
        width: 460px;
        min-width: 460px;
        max-width: 460px;
        height: 420px;
        min-height: 420px;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      body {
        background: #edf4fb;
      }

      .popup-boot {
        display: flex;
        min-height: 420px;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #10203c;
        font-family:
          "SF Pro Text",
          "SF Pro Display",
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .popup-boot-card {
        width: 100%;
        border: 1px solid rgba(109, 144, 189, 0.18);
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(250, 252, 255, 0.9));
        box-shadow: 0 24px 64px rgba(31, 52, 94, 0.12);
        padding: 20px;
      }

      .popup-boot-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: rgba(47, 109, 246, 0.11);
        color: #2f6df6;
        padding: 6px 10px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .popup-boot-title {
        margin: 14px 0 0;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.04em;
      }

      .popup-boot-copy {
        margin: 8px 0 0;
        color: #60758f;
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="popup-boot">
        <div class="popup-boot-card">
          <div class="popup-boot-badge">Window</div>
          <p class="popup-boot-title">Loading popup…</p>
          <p class="popup-boot-copy">Preparing your focus dashboard.</p>
        </div>
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
