<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Window — Popup (preview)</title>
    <script>
      // ── URL-param driven scenario switcher ───────────────────────────────
      // ?s=firstlaunch → first launch, never connected
      // ?s=carryover   → no active event, 2 carryover tasks
      // ?s=free        → no active event, no tasks
      // ?s=snooze      → snooze active mid-countdown
      // ?s=error       → calendar auth error
      // (default)      → calendar-blocked active event

      const params = new URLSearchParams(location.search);
      const scenario = params.get('s') ?? 'default';

      const NOW = Date.now();
      const iso = (ms) => new Date(ms).toISOString();

      // ── Shared state pieces ──────────────────────────────────────────────

      const defaultSettings = {
        enableBlocking: true, carryoverMode: 'union', taskTTLDays: 7,
        monthlyResetEnabled: true, minBlockDurationMinutes: 15,
        lastMonthlyReset: '2026-04-01T00:00:00', blockPage: 'custom',
      };

      const defaultAllTimeStats = {
        totalPoints: 1240, level: 5, title: 'Disciplined',
        prestigeCount: 0, tasksCompleted: 42, bestWeek: 340, currentWeekStreak: 3,
      };

      const quietSnooze = { active: false, expiresAt: null, taskId: null,
                            snoozesUsed: 0, maxSnoozes: 2, cooldownSeconds: 0 };

      // ── Scenarios ────────────────────────────────────────────────────────

      const SCENARIOS = {
        default: {
          settings: defaultSettings,
          taskQueue: [],
          snoozeState: { ...quietSnooze, snoozesUsed: 1 },
          allTimeStats: defaultAllTimeStats,
          calendarState: {
            currentEvent: {
              id: 'evt1',
              title: 'Build new feature: dark mode toggle',
              start: iso(NOW - 45 * 60_000),
              end: iso(NOW + 37 * 60_000),
              isAllDay: false,
            },
            allActiveEvents: [],
            activeProfile: 'Deep Work',
            allowedDomains: ['github.com', 'stackoverflow.com', 'docs.google.com',
                             'accounts.google.com'],
            isRestricted: true,
            lastSyncedAt: iso(NOW),
            authError: null,
          },
        },

        carryover: {
          settings: defaultSettings,
          taskQueue: [
            {
              id: 'task-1', eventTitle: 'Write quarterly report', calendarEventId: 'c1',
              profile: 'Deep Work', scheduledStart: iso(NOW - 3 * 86_400_000),
              scheduledEnd: iso(NOW - 3 * 86_400_000 + 7_200_000),
              status: 'carryover', carriedOverAt: iso(NOW - 3 * 86_400_000 + 7_200_000),
              expiresAt: iso(NOW + 4 * 86_400_000), completionNote: null,
              snoozesUsed: 1, maxSnoozes: 2,
            },
            {
              id: 'task-2', eventTitle: 'Finish API integration', calendarEventId: 'c2',
              profile: 'Deep Work', scheduledStart: iso(NOW - 86_400_000),
              scheduledEnd: iso(NOW - 86_400_000 + 7_200_000),
              status: 'carryover', carriedOverAt: iso(NOW - 86_400_000 + 7_200_000),
              expiresAt: iso(NOW + 1 * 86_400_000), completionNote: null,
              snoozesUsed: 0, maxSnoozes: 2,
            },
          ],
          snoozeState: quietSnooze,
          allTimeStats: defaultAllTimeStats,
          calendarState: {
            currentEvent: null, allActiveEvents: [],
            activeProfile: null,
            allowedDomains: ['github.com', 'stackoverflow.com', 'accounts.google.com'],
            isRestricted: true,
            lastSyncedAt: iso(NOW),
            authError: null,
          },
        },

        free: {
          settings: { ...defaultSettings, enableBlocking: true },
          taskQueue: [],
          snoozeState: quietSnooze,
          allTimeStats: { ...defaultAllTimeStats, totalPoints: 300, level: 3, title: 'Focused',
                          currentWeekStreak: 0 },
          calendarState: {
            currentEvent: null, allActiveEvents: [],
            activeProfile: null, allowedDomains: [], isRestricted: false,
            lastSyncedAt: iso(NOW), authError: null,
          },
        },

        snooze: {
          settings: defaultSettings,
          taskQueue: [
            {
              id: 'task-s1', eventTitle: 'Write quarterly report', calendarEventId: 'cs1',
              profile: 'Deep Work', scheduledStart: iso(NOW - 3 * 86_400_000),
              scheduledEnd: iso(NOW - 3 * 86_400_000 + 7_200_000),
              status: 'carryover', carriedOverAt: iso(NOW - 3 * 86_400_000 + 7_200_000),
              expiresAt: iso(NOW + 4 * 86_400_000), completionNote: null,
              snoozesUsed: 1, maxSnoozes: 2,
            },
          ],
          snoozeState: {
            active: true, expiresAt: iso(NOW + 3 * 60_000 + 20_000), taskId: 'task-s1',
            snoozesUsed: 1, maxSnoozes: 2, cooldownSeconds: 0,
          },
          allTimeStats: defaultAllTimeStats,
          calendarState: {
            currentEvent: {
              id: 'evt-snooze',
              title: 'Deep work session',
              start: iso(NOW - 30 * 60_000),
              end: iso(NOW + 60 * 60_000),
              isAllDay: false,
            },
            allActiveEvents: [],
            activeProfile: 'Deep Work',
            allowedDomains: ['github.com', 'accounts.google.com'],
            isRestricted: false, // lifted by snooze
            lastSyncedAt: iso(NOW),
            authError: null,
          },
        },

        error: {
          settings: defaultSettings,
          taskQueue: [],
          snoozeState: quietSnooze,
          allTimeStats: defaultAllTimeStats,
          calendarState: {
            currentEvent: null, allActiveEvents: [],
            activeProfile: null, allowedDomains: [], isRestricted: false,
            lastSyncedAt: iso(NOW - 5 * 60_000),
            authError: 'Token expired. Please re-authorize Window to access your calendar.',
          },
        },

        firstlaunch: {
          settings: defaultSettings,
          taskQueue: [],
          snoozeState: quietSnooze,
          allTimeStats: { totalPoints: 0, level: 1, title: 'Novice',
                          prestigeCount: 0, tasksCompleted: 0, bestWeek: 0, currentWeekStreak: 0 },
          calendarState: {
            currentEvent: null, allActiveEvents: [],
            activeProfile: null, allowedDomains: [], isRestricted: false,
            lastSyncedAt: null,
            authError: null,
          },
        },
      };

      const state = SCENARIOS[scenario] ?? SCENARIOS.default;

      window.chrome = {
        runtime: {
          sendMessage: (msg, cb) => {
            if (msg.type === 'CONNECT_CALENDAR') {
              // Simulate successful connection: update state and respond
              state.calendarState.lastSyncedAt = iso(Date.now());
              state.calendarState.authError = null;
              return cb && cb({ ok: true });
            }
            if (msg.type === 'DISCONNECT_CALENDAR') {
              state.calendarState.lastSyncedAt = null;
              state.calendarState.authError = null;
              state.calendarState.isRestricted = false;
              state.calendarState.currentEvent = null;
              state.calendarState.activeProfile = null;
              state.calendarState.allowedDomains = [];
              return cb && cb({ ok: true });
            }
            if (msg.type === 'TOGGLE_BLOCKING') {
              state.settings.enableBlocking = !state.settings.enableBlocking;
              return cb && cb({ enableBlocking: state.settings.enableBlocking });
            }
            return cb && cb(state);
          },
          lastError: null,
        },
        storage: {
          sync: { get: () => {}, set: () => {} },
          onChanged: { addListener: () => {}, removeListener: () => {} },
        },
      };
    </script>
    <style>
      /* Thin scenario switcher bar at bottom for dev convenience */
      #scenario-bar {
        position: fixed; bottom: 0; left: 0; right: 0;
        background: #f8fafc; border-top: 1px solid #e2e8f0;
        padding: 6px 12px; font: 11px/1 monospace;
        display: flex; gap: 8px; align-items: center;
      }
      #scenario-bar a { color: #3b82f6; text-decoration: none; }
      #scenario-bar a.active { font-weight: bold; color: #1d4ed8; }
      #scenario-bar span { color: #94a3b8; }
    </style>
  </head>
  <body style="margin:0; background:#f1f5f9; display:flex; flex-direction:column; align-items:center; padding:24px 0 48px;">
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>

    <!-- Dev scenario switcher -->
    <div id="scenario-bar">
      <span>Scenario:</span>
      <a href="?s=firstlaunch" class="firstlaunch">firstlaunch</a>
      <a href="?s=default"    class="default"    >default</a>
      <a href="?s=carryover"  class="carryover"  >carryover</a>
      <a href="?s=free"       class="free"       >free</a>
      <a href="?s=snooze"     class="snooze"     >snooze</a>
      <a href="?s=error"      class="error"      >error</a>
    </div>
    <script>
      // Highlight current scenario link
      const cur = new URLSearchParams(location.search).get('s') ?? 'default';
      const el = document.querySelector(`#scenario-bar .${cur}`);
      if (el) el.classList.add('active');
    </script>
  </body>
</html>
