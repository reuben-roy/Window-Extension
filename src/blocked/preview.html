<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Window — Blocked (preview)</title>
    <script>
      // Stub chrome.runtime so the React page renders without the extension context
      window.chrome = {
        runtime: {
          sendMessage: (_msg, cb) => {
            // Return a realistic state snapshot for the calendar-blocked scenario
            cb({
              settings: { enableBlocking: true, carryoverMode: 'union', taskTTLDays: 7,
                           monthlyResetEnabled: true, minBlockDurationMinutes: 15,
                           lastMonthlyReset: '2026-04-01T00:00:00', blockPage: 'custom' },
              taskQueue: [],
              snoozeState: { active: false, expiresAt: null, taskId: null,
                             snoozesUsed: 0, maxSnoozes: 2, cooldownSeconds: 0 },
              allTimeStats: { totalPoints: 1240, level: 5, title: 'Disciplined',
                              prestigeCount: 0, tasksCompleted: 42, bestWeek: 340,
                              currentWeekStreak: 3 },
              calendarState: {
                currentEvent: {
                  id: 'evt1',
                  title: 'Build new feature: dark mode toggle',
                  start: new Date(Date.now() - 45 * 60000).toISOString(),
                  end:   new Date(Date.now() + 37 * 60000).toISOString(),
                  isAllDay: false,
                },
                allActiveEvents: [],
                activeProfile: 'Deep Work',
                allowedDomains: ['github.com', 'stackoverflow.com', 'docs.google.com',
                                 'accounts.google.com'],
                isRestricted: true,
                lastSyncedAt: new Date().toISOString(),
                authError: null,
              },
            });
          },
          lastError: null,
        },
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
